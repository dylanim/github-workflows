name: .NET ECR Build

on:
  workflow_call:
    inputs:
      ecr_repository:
        description: 'ECR repository name'
        required: true
        type: string
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: '.'
    secrets:
      aws_access_key_id:
        required: true
      aws_secret_access_key:
        required: true

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4
        with:
          aws-access-key-id: ${{ secrets.aws_access_key_id }}
          aws-secret-access-key: ${{ secrets.aws_secret_access_key }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2

      - name: Set image tag
        id: tag
        run: |
          SAFE_REF="${{ github.ref_name }}"
          SAFE_REF="${SAFE_REF//\//-}"
          echo "IMAGE_TAG=${SAFE_REF}-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          docker build \
            -t "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            ${{ inputs.dockerfile_path }}

      - name: Push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

      - name: Summary
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
