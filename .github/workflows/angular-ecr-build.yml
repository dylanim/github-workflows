name: Angular ECR Build

on:
  workflow_call:
    inputs:
      ecr_repository:
        description: 'ECR repository name'
        required: true
        type: string
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: '.'
    secrets:
      aws_access_key_id:
        required: true
      aws_secret_access_key:
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Super Linter
        uses: super-linter/super-linter@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ github.token }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_HTML: true
          FILTER_REGEX_INCLUDE: .*src/.*

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4
        with:
          aws-access-key-id: ${{ secrets.aws_access_key_id }}
          aws-secret-access-key: ${{ secrets.aws_secret_access_key }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2

      - name: Set image tag
        id: tag
        run: |
          SAFE_REF="${{ github.ref_name }}"
          SAFE_REF="${SAFE_REF//\//-}"
          echo "IMAGE_TAG=${SAFE_REF}-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          docker build \
            --build-arg APP_VERSION="${IMAGE_TAG}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            ${{ inputs.dockerfile_path }}

      - name: Push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

      - name: Summary
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          ECR_REPOSITORY: ${{ inputs.ecr_repository }}
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
